services:
  zf_evolution:
    image: atendai/evolution-api:latest
    container_name: zf_evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVER_TYPE: http
      API_KEY: ntcp0shyre2l97bm6fduj4gq1zk8vxio
      AUTH_TYPE: apikey
      DATABASE_ENABLED: true
      DATABASE_CONNECTION_CLIENT: postgresql
      DATABASE_CONNECTION_URI: postgresql://evol_user:magsistem_senha_123@zf_postgres:5432/evolution?sslmode=disable
      DATABASE_SAVE_DATA_INSTANCE: true
      CACHE_REDIS_ENABLED: true
      CACHE_REDIS_URI: redis://zf_redis:6379
    networks:
      - zf_net
    depends_on:
      - zf_postgres
      - zf_redis

  zf_postgres:
    image: postgres:15-alpine
    container_name: zf_postgres
    restart: always
    environment:
      POSTGRES_USER: evol_user
      POSTGRES_PASSWORD: magsistem_senha_123
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zf_net

  zf_redis:
    image: redis:7-alpine
    container_name: zf_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - zf_net

  zf_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: zf_backend
    restart: always
    ports: 
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - EVOLUTION_URL=http://zf_evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - REDIS_URL=redis://zf_redis:6379
      - ADMIN_KEY=${ADMIN_KEY}
    depends_on:
      - zf_redis
      - zf_evolution
    networks:
      - zf_net

  zf_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
        - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    container_name: zf_frontend
    restart: always
    ports: 
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - zf_backend
    networks:
      - zf_net

networks:
  zf_net:
    driver: bridge

volumes:
  evolution_data:
  postgres_data: